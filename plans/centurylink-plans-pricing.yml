specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: CenturyLink (Lumen Technologies)
providerId: centurylink
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Telecom
  - Connectivity
  - Network
  - Enterprise
description: Lumen (legacy CenturyLink) exposes enterprise APIs through the Lumen Developer Center and
  Lumen API Marketplace. API access is partner-gated via OAuth 2.0 and tied to Lumen network service
  contracts. No public per-call pricing is published; API consumption is bundled with the underlying
  Lumen connectivity, edge, CDN, and security service contracts.
notes: API usage is not separately metered against a published price list. Pricing is contractually negotiated
  alongside the underlying Lumen network/edge service. Treated as a partner-enterprise model with no
  public tiers.
sources:
  - https://developer.lumen.com/
  - https://apimarketplace.lumen.com/
  - https://www.lumen.com/en-us/solutions/public-sector.html
plans:
  - id: centurylink-partner
    name: Partner / Enterprise API Access
    type: enterprise
    description: OAuth 2.0 access to the Lumen API Marketplace. Requires Partner Developer Portal registration
      and administrator enablement; usage is governed by the underlying Lumen service contract.
    entries:
      - label: API access
        name: api_access
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contract
        userMultiplied: false
    elements:
      - name: Location, Quote, Order, Service Inventory APIs
      - name: Billing and Outbound Notification APIs
      - name: Trouble Ticket API
      - name: OAuth 2.0 Client Credentials authentication
      - name: Partner Developer Portal registration required
  - id: centurylink-public-sector
    name: Public Sector API Center
    type: enterprise
    description: Government-tailored REST APIs for federal, state, and local agencies. Pricing follows
      Lumen public-sector contract vehicles.
    entries:
      - label: Public sector contract
        name: public_sector
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contract
        userMultiplied: false
    elements:
      - name: Federal / state / local connectivity APIs
      - name: Order, provisioning, and monitoring endpoints
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
