specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: CenturyLink (Lumen Technologies)
providerId: centurylink
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Telecom
  - Network
description: Lumen does not publish numeric rate limits on its enterprise Developer Center or API Marketplace.
  Limits are governed by partner contracts and OAuth client configuration; consumers should expect throttling
  and use exponential backoff. Authentication is OAuth 2.0 Client Credentials with administrator-enabled
  client IDs.
notes: No public per-second/per-minute numbers documented; partner-negotiated.
sources:
  - https://developer.lumen.com/
  - https://apimarketplace.lumen.com/
  - https://developer-test.centurylink.com/content/using-oauth-20-access-lumen-apis
responseCodes:
  throttled: 429
  unauthorized: 401
  serviceUnavailable: 503
limits:
  - name: Lumen API Marketplace (per OAuth client)
    scope: oauth_client
    metric: varies
    limit: see partner agreement / OAuth client configuration
  - name: Public Sector API Center (per agency contract)
    scope: contract
    metric: varies
    limit: see public sector contract
policies:
  - name: OAuth 2.0 Client Credentials
    description: All Lumen APIs require OAuth 2.0 Client Credentials. Tokens are obtained from the partner
      developer portal and scoped to enabled APIs.
  - name: Backoff Strategy
    description: Use exponential backoff with jitter on 429 and 503 responses; honor Retry-After headers
      when present.
  - name: Partner enablement
    description: Specific APIs must be administrator-enabled per partner before tokens can call them;
      unauthorized calls return 401/403.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
