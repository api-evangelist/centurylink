specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: CenturyLink (Lumen Technologies)
providerId: centurylink
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Telecom
  - Network
description: 'FOCUS-aligned FinOps framing for Lumen/CenturyLink: enterprise telecom and network services
  billed by contract; API access bundled with underlying network, edge, CDN, and security service charges
  rather than separately metered.'
notes: API consumption is not separately priced. Meters and FOCUS columns reflect the bundled telecom
  / network service billing surface.
sources:
  - https://developer.lumen.com/
  - https://apimarketplace.lumen.com/
  - https://www.lumen.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Lumen Technologies, Inc.
serviceCategory: Telecommunications / Network
billingModel:
  pricingCategory: Subscription + Usage (Contract)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Lumen Network Services
  ServiceCategory: Telecommunications
  ProviderName: Lumen Technologies
  PublisherName: Lumen Technologies, Inc.
  InvoiceIssuerName: Lumen Technologies, Inc.
  BillingCurrency: USD
meters:
  - name: connectivity_circuits
    unit: circuit-month
    aggregation: sum
    dimensions:
      - service
      - location
  - name: bandwidth_committed
    unit: Mbps-month
    aggregation: max
    dimensions:
      - service
      - location
  - name: cdn_traffic
    unit: GB
    aggregation: sum
    dimensions:
      - region
  - name: ddos_protected_capacity
    unit: Mbps-month
    aggregation: max
  - name: edge_compute
    unit: instance-hour
    aggregation: sum
principles:
  - name: Visibility
    description: Use the Lumen Control Center and Billing API for invoice and service inventory data;
      reconcile against contract MRC.
  - name: Allocation
    description: Allocate by site / circuit ID / service ID; tag in your CMDB to attribute cost to consuming
      business units.
  - name: Optimization
    description: Right-size committed bandwidth, consolidate circuits at strategic POPs, and exercise
      contract renewals to renegotiate MRC and term commitments.
  - name: Accountability
    description: Network engineering or telecom expense management owns Lumen invoices; review monthly
      against forecast and outage credits.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
